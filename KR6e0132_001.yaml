body:
  text: 東京南任薗講經道通述大覺示滅法日潛輝教逐機差不可局執性相互資其見圓妙道通夙附真乘窮居講肆論聽宣益經傳妙空退慚先哲無裨後學屢經患難倍覺衰遲築室城南苟延歲月而二三學者由不我棄日以講席為事因閲舊篋得所論法義謂曰槃節其間染淨相融依緣增約慢體慢類假我假法三境五果之微言四緣十因之妙説自共相之能詮表無表之分限依理依事之殊迷杌迷人之異真可謂槃根錯節之義鏘金振玉之文不學而知但聞其言未見其人哉非欲成一家之説用塞學者之問耳同心之士毋我笑焉壬寅正月望今釋此文略有四十四章一百法義迷諦義大乘伏斷義小乘伏斷義緣覺伏斷義大乘資糧加行義見道義相見道緣義頓漸斷二師有十四解十一解相見道安立諦義六現觀義修道義十地作釋義十勝行義十重障義十真如義轉依義四涅槃義四智義三境義假我法義二十七聖義表無表義問答料揀義自共相義種子六義殘果義能熏新熏義四分義迷杌義四業義滅盡定義五果義因緣義等無間義所緣緣義增上緣義十因十五依義福非福義八解義名色支義揀十二有支漏俱義二種生死義一百法義唯遮心外境以見所變相揀之識表心不空故説五位共一百法一自性有八一眼識二耳三鼻四舌五身六意七根八異熟二相應五十一遍行五別境五善十一根隨二十六不定四三分位有十一色聲香味觸法眼耳鼻舌身浮塵根四差別二十四一得二命根三衆同分四異生性五無想定五實性有六一擇滅二非擇滅三想受滅不動虗空真如識自性者前五識通善不善無記唯緣現量因第六引亦有任運分別三十一心所俱唯薰相分名言種與當報親因六意識具三性通俱生分別緣現比非三量招總別報五十一心所俱薰見相分種一念善惡業總報增上緣七末那識有覆無記性唯緣非量執第八為我十八心所相續不斷二執常起薰見分種與相貌差別增上緣八藏識無覆無記性遍行五心所俱唯緣現量種子根身器界藏漏無漏種雖非煩惱然是報體前異熟滅後異熟生無記有四一威儀二工巧三變化四異熟前三無記薰名言種第四無記劣第八全前六一分但酬前世因更不薰種子識相應者恆依心起與心相應繫屬於心取境行相顯體外皆作用遍行有五遍在八識三性三界三世有漏無漏一觸謂三和分別變易令心心所觸境為性受想思等所依為業根境識三更相隨順觸依彼生令彼和合互為因果順生心所功能名變易觸似彼生名分別二作意是意之作警心為性於應起者或現識同時於所緣境引心為業警心心所令趣前境三受領納為性起愛為業然境界受非共餘法於逆順俱非境定屬己者名境界受四想取像為性施設種種名言為業從因從果取青黃等共相境起言説故五思令心造作為性於善惡境役心為業正因邪因俱非相是所發身語因即是相所以有三別境有五此五緣四境起一所樂二決定三曾習四所觀五所觀皆有所緣境事多分不同不定俱起一欲於所樂境欲觀察者皆有欲生任運即無希望為性勤依為業勤通三性於不善勤即是懈怠於無記勤即是勝解於善勤即是精進境有三解一所欣二所求三所觀察二勝解於決定境印持為性不可引轉為業於邪正俱非教印持更有異緣不能引轉於猶豫境即無三念於曾習境令心明記為性定依為業體境類境應分四句一染心緣苦集體是體家類二染心緣無漏名是名家類三見道證真如體是名家類四無漏心緣苦集名是體家類前五第八泛觀不名類境非是曾習故不起念四定於所觀境令心專注不散為性智依為業於得失非境中決擇智生心專注言非唯一境不爾見道十六心應無智定生若不專注無有定生故非遍行五慧於所觀境揀擇為性斷疑為業於得失俱非境中慧推求若愚昧心中無有揀擇故非遍行此五緣四種境生非定俱起應説此五單單起有五能所別觀唯於所觀境別起定慧為止散心而不揀擇有定無慧如戲忘天或於所觀不專注推求法相有慧無定諸門料揀有十一一列名二出體三業四八識有無有義前五識無此自性散動不能推度有義前五容有雖無增上別境亦有微劣樂欲未自在位五八全無六七一分得自在時八地已去八種識心此五定有如遍行五五五受相應有義樂欲除憂苦餘四通三受有義五受俱相應論説憂根於無上法思慕愁戚求欲證故於淺苦處求解脫故此五復依三性三學三斷漏無漏報非報六門與煩惱隨惑善心等或俱或不俱至下當知善十一者唯善心俱名善心所謂信慚等定有十一合為八一信於實德能處也深忍樂欲果也心淨為性對治不信為業自性澄清能淨餘心所是信別相實中通三性實招當報漏無漏一切法德中唯善三寶有六一住持塑畫佛黃卷法染衣僧二小乘丈六佛阿含法四果僧三地前千丈佛住行向法三賢僧四地上十重他受用佛十度隨增法十地菩薩僧五等覺報身佛圓融法補處一生僧六一心覺照佛軌持法無諍僧二慚愧合説崇重賢善是慚別相輕拒暴惡是愧別相於聖教力生慚緣於世間力生愧緣賢人善法顯慚緣惡人惡法顯愧緣羞恥過罪是二通相此二不必雙具隨緣一境增劣不同淨土中亦有愧生三無貪等三根如何名根生善勝故對治不善故名為善根無貪於有有具三界五蘊也無染為性對治貪生善為業無嗔於苦苦具三界五蘊無恚為性生善為業無癡於諸理事無暗為性別有自性生善為業四勤謂精進勇捍為性勇非染法捍非無記三善根後起治懈怠五輕安有云欲界有遍於善心引定者亦有調暢有云欲界無輕安不遍善心唯定地有堪任為性對治昏沉六不放逸即用無貪及勤四法為體於所修事防修為性雖信慚等亦有此能而非根依七行捨於念中平等正直而住由不放逸先除雜染已行捨令心淨住對治掉舉八不害於諸有情不惱為性無嗔實有不害依彼一分假立無嗔與樂不害拔苦為顯慈悲二相別故諸門料揀有十二一列名二出體如文問寧淨少染答據實等約迷悟通局不同三業用四三假不放逸行捨不害餘八實有五自類俱起有云十一中四遍善心為信與三根餘七不定有云十遍善心報得輕安在定地有六八識隨位有無不定前六定地皆有散闕輕安七八因無果有七十法與五受俱除憂受苦受遍三界故八此十與遍行別境皆不違得俱起故遍漏無漏故九此十三性中唯善十此十欲界除輕安餘十通三界十一此十學無學皆通十二此十一非見所斷通修所斷者是有漏善及非所斷者是劣無漏信等五根染淨相翻頌曰行相相翻捨慢悼疑見三大性對治根三大四小中隨總名染淨相翻義若此行違彼行即行相相翻若違彼體即體性行相俱相翻若通三性雜善染者翻入別境性對治善慧性治染慧根本煩惱有六諸論立名不同有三解一五蘊論疑俱二見之後彼約唯分別者通俱生分別在前二百法論無明在慢後彼約通利鈍者在先五見及疑唯利惑迷理貪嗔慢通迷事理三唯識論為不善根在前所以慢非不善根在無明後一貪於有有具染著為性二嗔於苦苦具增恚為性三癡於諸理事迷暗為性此三皆能生苦為業四慢恃己於他高舉為性能障不慢生苦為業於德有德心不謙下輪轉受苦故有七體九類於三品境起三品心勝劣分上下齊等便為中前四慢緣外境起他我見是凌減慢後三緣內我見起恃己慢無別法數故不立類七體者一單慢於下品境起於劣計己勝於中品境於等計己等二過慢於中品境起於等計己勝於上品境起於勝計己等三慢過慢唯上品境起於勝計己勝四卑慢唯上品起五增上慢少得為多六我慢計蘊為我七邪慢全無為有九類者我勝過慢類我等慢類我劣𢍉慢類有我勝𢍉慢有我劣過慢類無我勝慢類無我劣𢍉慢類無我等過慢類前三類將自望他後六類將他望自有是表義無是遮義所緣境上品能緣心下品本論云六於中上生三於卑慢生是我劣有勝無劣若依品類足論三依一品生為我勝有劣無等皆過慢類三依三品生為我等有劣無劣依三一品生我勝有劣無劣皆卑慢類本論則多分不同足論則即復有過五疑於諸理事猶豫為性能障不疑於他世因果三寶四諦生疑雖通緣理事為相唯迷理惑非如二取唯緣事迷事六身見染慧為性分別行緣蘊不分別所起處有二十句如於五蘊中執色為我我有色色屬我我在色中五蘊總相計之有五箇我見十五箇我所見若執一蘊為我何蘊是所起處則一蘊為我餘四蘊下皆有三箇我所見共有十二箇我所見五蘊計之便有六十五箇我我所見七邊見執斷有七計常有四十染慧為性我見後起前際有八四遍常為我及世間是有是無是亦有無是非有無四一分常為我常他無常有無俱是俱非後際有三十二有想有十六為我後世是有是無俱是俱非計色身也四邊我是有邊無邊俱是俱非四我是小想大想種種想無邊想四我苦樂俱是俱非無想有八四我有色無色俱是俱非四有邊等四句後際非有想非無想八句四我是有無俱是俱非四我是有邊無邊等四句斷見有七為衆生死後斷滅欲界人天為二色界為一無色為四有四十七種斷常邊見依何地繫何地定散尋伺八邪見有十五種染慧為性撥無因果親迷諦理二無因論者一從無想將死不能憶入心前事便生撥謗二從無想沒因尋伺所起便生撥謗三撥無因果或有或無或俱非俱是四不死矯有四句五種計現在樂為涅槃一執欲界人天樂二計初禪樂三計二禪樂四計三禪樂五計隨第六全具前五有大隨八并中隨二及小隨三五受俱門中隨二大隨八五受俱小隨十四受俱除樂受六別境門皆得俱七根本門中二大八與根本容起小隨十法不與見疑俱忿等五法與慢癡俱此中已有體者取不相違得俱與他性相應非自性也八三性門小隨七中隨二唯不善性小三大八通二性九三界門不善唯欲界有覆通上二界十隨煩惱皆非學無學彼唯善性十一俱為有事十二並皆有漏不定有四謂悔眠尋伺下二各有淺深二於善染遍行別境皆不定起體通三性唯在意地依於尋伺有染離染立三地別不依彼種子及理行有無一悔謂追悔先所造業後方追悔惡作為因追悔是果二眠令心昧略為性有五蓋八纏體通三性非思慧為體別有自性量云悔眠是有法非思慧想宗是纏性故如無慚三尋伺合説用思慧為體令心忩遽於意言境粗轉細轉為性思為尋體淺慧為尋體深思為伺體淺慧為伺體深尋伺各有染淨二分無起從二俱通不深推度及深推度或云思增慧劣為尋慧增思劣為伺或云思慧俱劣為尋思慧俱增為伺五蓋者覆義也一欲貪蓋覆出家二嗔蓋覆正行三昏沉蓋覆定本為對治掉舉不覺引生睡眠四掉舉惡造蓋覆慧高明之心對治昏沉不覺引生散亂五疑蓋覆捨雙捨前四不高不下不覺引生疑八纏者昏沉睡眠纏掉舉惡作纏慳嫉纏無慚愧纏諸門料揀有十二一假實門前二實後二假二自類單單可想應三諸識唯意四五受容起五別境容起六善位不定七根本不定八隨惑不定九三性不定十三界欲全中間一分上二全無十一三學容有十二三斷染者見所斷無記修所斷善者非斷上總六位五十一心所俱生頌曰五法五俱起遍行五九法必六俱別境五不定四有遍行五俱九法定十四癡八大隨遍行二十一十五善十小三貪慢疑與五見三法起十六輕安無慚無愧癡遍行五法大隨八中隨二善十有輕安并遍行五十六八法十七俱小七如起一時有中二大八癡及遍行五是心所相應慧者應當悉三分位者有十一是心心所起處分位五根六塵四差別者有二十四不相應依前三分位假立謂一得二命根三衆同分四異生性五無想定六滅盡定七無相報八名身九句身十文身十一生十二老十三住十四無常十五流轉十六定異十七相應十八勢速十九次第二十時二十一方二十二數二十三和合二十四不和合五六無為者一擇滅無為因斷障得三乘見道二非擇滅無為闕緣不生善無記法三不動無為妄心不生四想受滅無為報得五虗空無為離礙假説六真如無為常住不變迷諦義夫見道所斷十煩惱十俱斷頓以真見道總緣諦故分別煩惱迷於四諦有總有別而四句一數總謂十煩惱迷四諦三界一百十二兼修道共有一百九十三種二行總苦集是彼因依處滅道是彼煩惱怖畏處能斷彼三數別二唯迷苦八通迷四身邊二見苦處起別定非我扃苦四行別謂疑後三見親迷苦理二取唯迷事緣前三見從他而生如貪嗔慢通迷理事唯疏無明通迷理事唯親若親緣理必親迷疑及三見若疏緣理未必親迷為二取緣事必迷事若獨頭貪嗔慢亦親迷滅道若貪嗔慢三隨見疑引生是疏迷理惑若隨二取引生是疏迷事俱生無明通迷理事獨頭無明親迷四諦理且如無明迷於一諦邪見與疑同時起初起時依諦增近引生貪嗔慢所緣諦增依諦劣此見疑是何諦下惑答此隨緣判諦依即是緣若作遠諦判依增緣約鄰近引故局依緣增依約疏遠引故局緣若作迷諦則有四句一依緣俱增親引親二依緣俱約疏引疏三依增緣約親引疏四緣增依約疏引親若依即是緣隨緣判諦所緣不定故有依苦身而起緣二諦三諦而起貪等若緣即依隨緣判諦依不定故依多諦而緣一諦若依緣各異初起隨依後起隨緣大乘伏斷義第七識中俱生二障現行伏在八地已去若斷彼種至金剛心第六識中二障種理分別迷於四諦見道斷俱生種理迷三界事心地理九地俱生從粗至細分為九品前八品俱生迷事第九品通迷理事一地有九品九地便有八十一品於見道前伏下俱生現行迷理事惑其分別二障迷四諦理有一百七十二義不伏便斷於見通前一無數劫伏除二取俱生現行若二乘人獨覺回心至大乘十信初心經十千劫若初果回心有八萬劫二果回心有六萬劫三果回心有四萬劫四果回心有二萬劫小乘伏斷義聲聞人從他聞法至自乘見道利根者三生鈍根者六十小劫有四類修皆猒喧求靜一見道前伏惑超伏下欲界俱生前六品入見道不出便證第二果若伏下欲界九品俱生惑入見道不出超二果證三果上二界有七十二品惑共障無學二次第得果起一無間道一解脫道斷惑一品依初禪未至定三見道後束惑超九品俱生惑束九大品斷欲界初品時即斷至有頂地初品由意樂力是利根者四超斷不超果伏惑至五品若斷只得初果伏至七八品若斷只得二果若斷第九便得不還下八地前八品迷事第九品通迷理事伏至無所有處只得三果非非想一地不伏便斷彼無欣厭相便證無學欲界九品俱生惑共閏七生者上上品獨閏二生上中上下共閏二生中上品獨閏一生中中品中下品共閏一生此上是一來果下上品獨閏半生下中品下下品共閏半生是不還果緣覺伏斷義緣覺見生滅緣發修行心厭喧求靜利根小乘或云獨覺從果為名於見道前百劫練根伏下九地俱生迷事惑至無所有處入見道時三界分別俱生頓斷法已後入觀不出用九無聞道九解脫道法智法忍上下四諦共三十二心并總一無間一解脫其有五十二心證無學果大乘資糧加行義一資糧位依因力善友力作意力資糧力自聞無漏教法薰習已去發深固大菩薩心四弘誓願於一阿僧祇劫善備福德智慧二種資糧又名順果解脫分善勝解心中修起四十心所謂十信十住十回向為入見道復修加行二加行位有四一燸位依明得定發下品尋伺望無漏聖智名明明即所得定能發慧慧即尋伺覺資糧位中一切法名義各有自性差別所薰所取種子伏之假有學無離識非有二頂位依明增定發生上品尋伺重觀順無所取名等四法假有實無先所薰種子不生現行已得純熟三忍位依印順定發生下品如實智印前所取無順後能取無若印寬順狹印通初品後品樂順在中品若印順皆寬者下品印無所取即是順無中品順即是印也上品印無能取順後世第一也若印順皆狹印即初後品順通中後品下忍名印中忍樂順上忍印順忍即印印即是智四世第一位依無間定發生上品如實智一念雙印前能所空名世第一異生性中最後念故有漏無間有無漏起無漏無有有漏生既無實境離能取識寧有實識離所取境如實無漏智生我法二執俱無故名世第一也若入見道唯依欲界身第四禪心餘二厭心非殊勝故𤏙頂忍位通依諸二禪三禪靜慮世第一唯依第四禪心入見道若二乘四善根唯依初禪未至定回心入大乘見道唯斷所知障許依色界身入見道義若時於所緣智都無所得爾時住唯識離二取相故心境相稱如智冥合離二取絶戲論能證之智有三一云相見俱無説無二取二云二分俱有若無相緣色應得聲無見非能緣三云見有相無無分別見分狹帶真如體相起今世第一無漏智生體會真如名為見道初照理故多生歡喜本論云實斷二障分別隨眠實證二空所顯真理雖多剎那事方究竟而相第故總名一心相見道緣非安立無漏後得智見分緣真見道理作三心倣之一緣內遣有性假智除下品二障惑二外遣諸法假智除法執中品惑三遍遣內外假智除上品二障若小乘倣法俱是煩惱障若大乘倣法有情諸法是二障粗者分二細者為一第三倣證前二心總別既殊緣名法總緣名類三緣下名法緣上名類若別倣用二無間道合倣用一解脫道漸斷十四解有云此中二空二障漸斷漸證以有理淺深障有粗細異故一二障各分三品次第斷之用六無間六解脫二勝進共十四心二用十三心除中間勝進三用十二心除末後勝進四若用後無間即前解脫有八心六無間一解脫一勝進五用七心除末後勝進六二障各分二品用四無間四解脫二勝進七除末後勝進八除中間勝進九用後無間即前解脫有五心十除末後勝進十一二障粗者別斷細者合斷七心十二除末後勝進六心十三後無間即前解脫有四心十四除末後勝進有三心頓斷十一解有云此中二空二障頓斷頓證以真見道不別緣故二障共作二大品用三無間三解脫一勝進七心除末後勝進六心若後無間即前解脫四心除末後勝進三心若二障粗細共二品二無間二解脫一勝進除末後勝進有四心後無間即前解脫有三心除勝進有二心若二障合為一大品或三或二或一相見道安立諦無漏後得智見分緣安立諦作十六心影像倣真見道無間解脫二見分於四諦下斷惑證理見分觀真如為境時斷四諦下惑證四諦下理有八箇見分其自證分證前所斷四障所證四理是觀正智為境今相見道後得智見分似彼真見道中斷證故云倣法論云四諦法忍智自性立名見分斷惑為斷三界二十八種分別隨眠倣法解義四諦下法智倣法立名見分證理證前所斷倣法解義四諦類智忍自性立名自證證斷於前法忍各別內證通自性倣法解義立名四諦類智自性立名自證分證見分證理印可前印又上下諦境不説自證分只論見分下界現前名法不現前上二界是類三界四諦下有一百十二種分別煩惱論云法真見道無間解脫各有見自證分差別建立六現觀義一思即現觀上品喜受相應慧思緣共相境二信俱現觀四不壞信二戒之現觀助成智故四現觀即智智之諦諦之現觀五現觀之邊邊即智智之諦諦之現觀後得智六究竟即現觀上一現觀別名下一現觀通名真見道收無漏戒至究竟四少分相見道收第五全餘四少分除第四現觀頌曰此一非依思現觀不依九地定生三依五依生後三未至定及四禪根本一種分亦爾信現觀也餘依一切依戒現觀不依九地定生修道義無得不思議是出世間智捨二粗重故便證得轉依上二句無能所取是根本智下二句是修道義取後得智依字通染淨轉字為因捨染得淨是轉之依無漏智種本有三品其新熏種亦有三種智體是一轉去劣用資新熏下品齊本有中品資新熏中品齊本有上品一念無漏智生其用有三一上資新熏二傍資萬行三腳下用增不説無漏智有惑可斷但違彼二障種體令永不生於染淨功能上立凡性聖性是不相應收十地作釋一極即喜二垢之離三光之發四慧如焰五難之勝六現即前七遠之行八不能動九善之慧十法如雲每地作四釋若地之極喜喜是加行智若地即極喜喜是根本智若極喜之地以別揀通是後得智中修行若極喜即地所證真如十勝行義十行者前六行對法論通有三種如六行束三壇寬狹可知後四各有二種要有七最勝方成度義一安住菩提性二依止菩提心三意樂慜有情四事業具足行五巧便無相智六回向無上菩提七不為二障間雜應作四句一是施非度無七最勝二是度非施隨喜具七最勝三亦度亦施可知四俱非貪等前三施戒忍人天增上生道後三勤定慧決定勝道方便助施戒忍願助精進力助靜慮智助般若凡行一施定得五果一斷慳得離繫果二攝授自他得士用果三得勝生處等流果四引大涅槃增上果五感大財異熟果十重障義異生性障善不善業是能異因五蘊報是所異果果從因別是異之生報生五蘊是總相性是身中染法別從總以彰名是生之性性是二障種體障是種上功能是性之障所依種斷能依功能不生名為聖性然愚與粗重皆第六識中俱生法執作七分斷之若障即是愚障中無煩惱若障之愚障通二障愚用所知一分為體一極喜地斷異生性障執著我法愚惡趣雜染愚二離垢地斷邪行障微細誤犯愚種種惡趣愚三發光地斷暗鈍障聞思修妄失欲貪愚聞持愚四焰慧地斷現行煩惱障彼昔多與所知俱生六識有俱生二見永不現行貪嗔不與二見俱此名害伴等至愛愚法愛愚五難勝地斷下乘般涅槃障背生死愚向涅槃愚六現前地斷粗相障觀察流轉愚無相現行愚七遠行地斷細現行愚流轉生死愚生滅愚八不動地斷無相加行障加行愚相土未自在愚九善慧地斷利不欲行障義詞愚辨才自在愚十法雲地斷未得自在障大神通愚悟入微細愚十一斷佛第一障所知著愚微細礙愚十真如義依如説教依教談如真如轉勝將旨就詮有其十種一遍行二最勝三勝流四無攝受五類無別六無染淨七法無別八不增減九智自在十業自在二轉依果約位有六種轉一損力益能轉為懺悔過惡勝解力損染種子勢力益淨種功能二通達轉為五無下劣轉六果圓滿轉轉依義一能轉道有二一能伏道加行位伏隨眠不起引無分別智二能斷道見道根本智斷迷理事惑二所轉依有二一持種依第八不依於他受染淨熏是淨無記性二迷悟依真如凡不減聖不增絶染淨三所轉捨有二一所斷捨為無間道斷二障種令永不行二所棄捨有四事一有漏善二劣無漏三異熟無記四習氣於解脫道中捨劣得勝四所轉得有二一所生得即四智相應心品有二十二法二所顯得真如體三乘離障不同説四涅槃由能伏道熏持種依有所斷捨獲四智菩提由能斷道證迷悟依棄捨四事顯得四種涅槃四涅槃義一本來清淨涅槃一切衆生共有二有餘依涅槃為前三果有餘俱生惑七返身能伏斷智無學人未入滅有苦依身在三無餘依涅槃樂寂灰斷者小乘擇滅大乘法空真理四無住處涅槃由悲故不住涅槃由智故不住生死料揀三乘有學凡夫具初一若回心入大者初二四無學不定性有初及三大乘有學具三直住入地有初後唯佛具四云何佛有有餘依涅槃答假説二乘但得擇滅依不得無住處云何斷所知障不得涅槃答法空真理即無住處初一真如無為後三擇滅無為想受滅不動非擇滅收虗空離礙四智義一大圓鏡即智能現能生身土智影是自受用身土所現所生二一切有情平等性即智依無住涅槃建立為十地菩薩現他受用身土三妙觀察之智觀自共相轉能遍十方善説法故四成所作即智為地前菩薩現千丈身為凡夫現丈六隨類鹿馬此四智皆有三十二法相應總收佛地一切功德轉於有漏八七六五相應心品東中智強識劣六七二識見道轉成智第八前五果中方轉此四心品緣一切真俗為境論云此即無漏界釋名不思議善常歎德安樂解脫身大牟尼名法揀因位二乘也諸漏永盡羅漢亦具非漏隨增前三果亦具此性淨凡夫亦具圓無學亦具明菩薩亦具但長讀文勢義意乃遠三境義奘法師頌善唯識解性境不隨心獨影唯從見帶質通情本性種等隨應一性即境為五塵根境從實種生有實體用能緣之心得彼自性為自住自性不隨能緣通三性有二一真性境為前五識緣自界因中五塵親得體八識各自證分緣見分二似性境第六識緣前念中心及緣自身五根疏得體名似二帶質境見能變相相能帶質是質之帶能帶即相分中間相分攝歸本質唯無記攝歸能緣見分通三性若離見別談與本質種同有二一真帶質以心緣心有實本質如第七識緣第八識自證分為我中間相分不熏種子二似帶質前六識心緣外境時中間相分定熏種子名似帶質三獨影境第六識見分變三際境獨頭意識影像相分唯從見分生有二一有體第六識緣過未五蘊性繫種三定同能熏相分種後生本質二無體第六識緣遍計實我實法龜毛兔角不熏種遍計色收四性種等隨應者不定義二合有三一第八緣散地境心王緣是性境心所緣是獨影不熏種子二前五緣自他根塵是性境亦帶質熏種子三第六緣過未五蘊是獨影境能緣見分上有相分亦名帶質三合有一因中第八緣定果色聖境界也心王緣性境心所緣獨影仗他聖境為質亦帶質或性種繫不同能緣如下界緣上界天眼耳等或繫同種性不同如緣當界自他五塵或心種同繫性不同如第八緣上界天眼耳心所直緣相從見生獨影境心王緣之帶質雖繫性不同心王與心所同是心種也假我法義若唯有識云何世間聖教説有我法答由假説我法有種種相轉世間假有二一云無體隨情假約言為因起我法説所執全無言當我法一云以無依有假約妄計我法熏習為實情當我法即有情命者實德等業五常之道聖教假有二一云有體強説假約言雖有如嚮非實真如隨緣施設言教一云以義依體假約所變相見起於言説斷染取淨引生真見二十七賢聖知苦斷集證滅修道修道根有利鈍一信解二見至望自乘見道利者三生鈍者六十劫入見道三預流果斷三界分別捨凡入聖名流四預流向相見道前十五心五七返得初果身死修惑力能閏七生六一來果斷修惑前六品或起斷不超果七一來向用六無間六解脫前十一心八家家斷欲界俱生前三品名三生家家斷至四品名二生家家九不還果斷欲九品俱生惑更不還生欲果十不還向九無間九解脫前十七心十一身證斷欲界九品俱生惑親得四禪八地定十二一間斷下上品俱生惑身死更有半生十三不生界斷二界七十二品惑超出分斷生死十四不生向前七十一心十五中有身般涅槃非欲本有身生結已盡非色界生有身起結已亡十六一種槃得色界身便般涅槃十七有慧般不斷定障十八無慧般斷定障十九無行般不起行由宿習力至色界身證無學果二十有行般依色界身起行入涅槃二十一上流般樂慧生五淨居樂定生無色界二十二退法般退現法樂二十三思法般思即不退現法樂二十四護法般若不護持即便失之二十五住法般不能轉鈍成利二十六堪達法般定慧均平斷下劣受二十七住不動般不為煩惱習氣所動頌曰信見身正慧向果各有四七返家種間中有生無上退思護法住堪達并不動表無表義論云然依思願善惡分限假立無表有四一定道俱時戒即依思善分限假立二別解脫戒依思願善分限假立三不律儀依思惡分限假立四處中戒全便文又律不律或依發勝身語善惡增長位立有五一假戒依實思二發勝揀去動身思發語思三身語唯表色四善惡揀無記五增長揀佛果又定共戒道共戒依定中止身語現行思立大乘道共戒唯無漏小乘定共戒唯有漏大乘定通漏無漏先有期願別解脫類思即是業意不得名業由思作動是意之業名為無表又依身語之業業即是表或身語即表若表名句是語之業有四句一思非思無表二散意唯表非無表三思種唯無表非表四定道共成亦表亦無表問答料揀無表依表立表有多念從何念立答俱時同一種或先動身只依動身上立無表戒先發語亦爾前後各別種或動發俱時同一種上立無表戒皆依初上立戒所依為於第二禮足請師三翻請中於第一翻作白云我今欲於大德所乞受我菩薩一切淨戒於此發心或先合掌後發語只於初上立問熏種必是有心於和尚處得戒應爾答和尚第三翻羯磨其受戒者雖住睡眠由前要期今時緣具新熏種子雖無現行熏習亦得功能念念倍增如使人行施遣使殺生亦爾已後功能遇破戒有捨時其種常在問八戒是人天戒一日一夜受得盡形受否答非出家相問若盡末來際受聲聞二百五十戒得否答非菩薩相問患手足人既有三乘種性得受僧戒否然佛不許出家答但持五戒亦得證果如二果人猶有妻奴問無種性人不許受三乘戒如何得尊高果答得受人天戒問人天戒不殺與菩薩戒何別答其心別故問何故皆招人天果答兼正不同菩薩無著問聲聞戒要無十三難事何故不揀無種性人或云難知問云舍利弗不度樵人言無出家分自共相義經言諸法離言名為自相在言名為共相名不遍法有論中自共相論云然依聲假立名詮諸法自相句詮諸法差別文即是字為二所依法無礙解緣假名義無礙解緣實聲問何經中名詮共相論中言名詮自性答經中共相是論中在言之自性問何名自共相答智證離言名為自性相假智及詮名為共相或云共相如五蘊軍林是假問在言離言以何返覆答共相是義如説火遮火體問經中但詮共相自相離言離言稱理否答為遮可言言自相不可言非不可言即稱法體法體亦非不可言問心緣應得體答但得共相之自性非得法體但證而知種子六義論云遮無為心心所現行不具此六不遮現在種子穀麥生牙亦具此六義也一剎那滅現行心體才生即滅有勝功能方熏種子二與果俱有依生現果立不依種引種現望現三恆隨轉一類相續生滅至果位方斷餘無治道四性決定造善惡因功能決定遮異性因生異性果五待衆緣名言種子現行時具根境意方生遮自然六引自果遮色心互引自性相望是然種子非色無執礙非心無緣慮能生色心故名種子唯第八中業招聚種子方具上六義外穀麥種子兩重變是第八識親相第六識種子殘果義論云內外種子勢力生近正果名曰生因引遠殘果名曰引因無性論云內種望現識名生近正果望名色等引遠殘果外種望芽名生近正果望青葉為遠果世親論云內種望前六識生近正果望死後殘體為遠果因外種望芽莖等生近正果望幹果為遠果因後解不遍四生化生無殘骸胎生人雖生他界由前引因力故有殘骸具增上緣其白骨相分是後人親變若前人引因力盡時一界中人親相分同時盡如田苗無水種子亦絶問樹若拔之唯一人壞業熟何故餘人不變亦壞也答拔人望自變何親因望他人是增上緣增上既壞餘人因緣亦壞人命備殺亦然問後人有漏識心如何變得無漏舍利答非是殘骸是佛無漏智親變能熏新熏義論云內色心二種名言定有熏習外種不定有有如香熏巨勝無如餘穀麥所熏四義唯是第八識持種依自證分也一堅住性非前七識自性有變動二無記性非是善惡如極穢物三可熏性非無物心所自在體虗四與能熏和合非他身異處能熏四義唯前七識非異熟生及異熟報心心所自證分前七識見分為能熏自證與見分力一有生滅非無為及第八常住無間二勝勢用非異熟心心所三增減非佛果性彼已圓滿四與所熏和合非他身要和合問髮毛爪牙即是外境應不執受答從內根生亦執受有四義一執為自體二持令不壞三領亦為境四能生覺受四分義瑜伽論云然心心所同依一根同一所緣不同一行相為受想思等各別若無自證分應不能過去事一外道世人根為量果二小乘説見分為量果三安慧師説一分自證似能緣名見分似所緣名相分能似自證説為量果四難陀論師二分能緣見分所緣相分見分體説自證量果五陳那論師三分所量相分見分能量自證量果如尺量物物為所量尺是能量記憶量果六護法論師四分因中有四重量果向外緣一相分所量見分能量自證量果二見分所量自證分能量證自證量果三相分所量自證分能量證證量果四見分所量證自證能量自證分量果唯除相分無能緣用若至佛果增五重見分緣內二分變相即相分有二重量果若內二分互緣則見分為內二分量果已增四重更以證自證緣相分時見分為量果共有九重前二分緣外後二緣內前一唯所緣後三通能所緣前二分通量非量後二分唯現量前二分通染非染後二唯非染前二分通解非解餘二分定解今四分非即其用種子各別故四分非離常相應故心心所體前二分外能所後二分名內能所然見分不自緣見分如刀無自割用迷義論云諸異生類三性心時雖外起諸業而內恆執我令前六識中所施物持戒不能忘相諸疑理者於色等事必無猶預如人迷不知是方執為人迷為先後方執人又云法中據迷理人中起事執約義有八據體有六為因為果喻淺喻深第六識迷現在機境為能喻第七識迷第八識自證分為我是所喻我人相應起位法執亦必現前我執必依法執而起能喻第六淺能迷心謂人之心深所迷相謂人之執所喻第七淺能迷心謂人心深所迷法空理謂人之執起我依法執因起人報果淺者能迷心謂人之心以喻二執唯依事起深者所迷相謂人之執以喻二執唯依理起問淺深中俱是人解云何分也答前無起言但云心也問何故須説二種答法執為因起於我執如迷心上起謂人解若證諸法空既知是必無人解問何須要淺深答第七迷第八識事起於二執俱淺若迷第八法空理二執俱深問若迷生空理為深何過答法寬我狹善法師云愚伸此解望契聖心立筌來慕宜應共悉天微抄曾不屬心諸百法章安得意遂使學者俱迷至理競執譊訛違背聖言四業義第六識中一念分別別善惡業招當來總報諸教異説有二種二受一決定受三時俱勝二不決定或闕一二有二種四受一唯識論中四受一順現決定受上品別報二順生決定受上品總報三順後決定受中品有闕四順不定受悔所損無知造瑜伽論中四受一時定報不定二報定時不定三時報俱定四時報俱不定若互相攝者唯是不定業總收餘者唯識論中三種決定業收瑜伽論中收第三時報俱定收唯識論中前三句却瑜伽論中一二四句收唯識論第四句若定業收三不定業唯一若定業收一不定業收三其造業性定雖經多劫排之不受其業現生後受不改本名從初造因業性定故又有二種五業一顯揚論五業一順生二順現三順後四異熟五作業各有決定二字集論中五業一故思造時他教二他勸三無知造四執著五妄想初三不增長不定受後二增長時報定受滅盡定義滅盡定者為有無學或有學聖已伏或離無所有貪上貪不定由止息想作意為先令不恆行第六識滅恆行染污第七滅總名滅盡主名無心別名滅受想此定唯聖非凡初起必依有頂遊觀加行而入根本無漏定中最居後故若久修此定已得自在餘地心後亦得現前若遠超者從初禪次念起非想心為加行而入若近起者由串習力不起非想心便入滅定要斷三界見惑修惑斷下四地障定強故上五地修惑伏斷至非想時作三類厭心至微微心時二十二法為彼定體遍行五別境五善十一心王現行腳下種子上有礙心功能名為定體初果回心向大趣滅盡定者六人二果回心向大趣滅者有三人身正還回心趣滅有七十二人若不回心有不入者初果二果非身證不還獨覺一分除步行入地除悲增者不起此定其餘聖人皆起此定或為成就無心功德或為止息度生勞慮五果義體生等流異熟義生增上士用等流因者名言種子親生當果現行能酬前因別報色心異熟因一念善惡業能招一期總報果果體唯無記異類而熟異時而熟變異而熟俱有勢力是增上果一得多報是士用果如求成佛生在王家若無漏因真實知見離相修因得離繫果三乘聖位四句一因果俱不雜一眼根望眼識增上因得增上果二種子功能望現行識士用因得士用果三自類種子望等流現行等流因得等流果四善惡業招無記果二因雜等流異熟果各別三果雜因不雜於總報上義説四因果俱雜於等流異熟果因上義説增上士用因果因緣義因緣者為有為法親辨自體通於三性三界九地漏無漏色心別報與後自類為因是種引種及同時現果為因是種生現此非間斷異性若現行與種子為因是前七識有漏色心三性名言種子在第八無記識中含藏遇緣生現唯除佛果無漏善法及四無記中劣無記異熟生及業招第八非是能熏因緣有三為現行熏種子種子生現行種引種下有八句同時異時非因緣貫下讀之皆不親辨矣一種子望現行異類二現行望現行異類三種望種異類四現行望種子異類等無間義等無間者前聚於後自類無間等而開導令彼定生唯現非種體通三性等望前後無間在中前一聚心心所劣後一聚心心所多用等也若前一聚二十二法後一聚亦爾頭數體等等無間非俱時同類如觸望作意非無學末後心以無所引不名此緣若此八識心無間後念定生説此為彼等無間緣此三界有十二心上下相引生死位中開導故欲界有四一善心二染心三有覆四無記上二界除染心加有漏各有四三界共十二心三乘修行漏無漏相引者大乘見道六七二識頓悟人用第四禪心引生無漏第八前五至成佛方有漏引生無漏鏡知及成所作智第七三界漏無漏位互引三句一人執入種位引生法執生現行二人執入種位生空後得智中雙執生現行三法執入種位引生平等智生現行第六識中三界九地漏無漏位於閏生智互相引二乘人漸悟通欲色界引生無漏發心留身不定同界唯除五淨居人無發大乘心者前五識眼耳身三二界二地繫上下死生相引鼻舌二識一界一地繫自類相引至成佛時互引然五色根是第八相分有漏根不發無漏識具四義第六具三義無同境一有漏揀佛果二不共揀第八共依三必俱揀第六或不俱四同境揀第七為根發第六無漏識所緣緣義所緣緣者謂若有法非計所執為緣能引生心是帶己相己者境也見能變相相能帶境古云帶為變帶難云若證真如不變如相應無所緣應説帶為狹帶相即體相內三分相緣挾帶真如相起變帶有三一即智變轉地種子歸識變大地作黃金二離質變無而忽有三仗質變轉粗為細浮塵不動細相籠之如羅漢赴供心或相應者是所引能緣義中間相分是所緣能帶義起於內所慮相分所托本質應知彼是親所緣緣如鏡水為緣生於面相設為所慮非是所托如假和合軍林設為所托非是所慮若與見分體不相離為親所緣望他本質為踈所緣若第八識仗他本質變他浮塵一切時中親疏不定若第七識者定有第六識緣過未疏無親有前五識仗他引生親疏定有若內二分相緣體挾體緣見分緣相時用挾用緣自證緣見分時體挾用緣若相分望外質亦挾帶起見分相分望外即為變帶增上緣義增上緣者謂有勝勢用於生住成得四事中或順或逆與未生法為緣非前滅法如世霜雹等望未生黃葉為順因望未生青葉作違因如一念無明起亦爾一念無漏智生亦爾餘三緣不收皆入此中應知二十二根即此緣性三無漏根者一未知當知根從初發心去至見道前十五心已來皆是二已知根從十六心已去至金剛心皆是三具知根成佛已去盡未來際皆是頌曰取境眼耳鼻舌身意續家族男女二根活命命根受業果五受根也世間信等五也出世淨三無漏根依此量立根又頌能受隱顯境眼等六男女二受用時邊際命根受用發雜染五受安立清淨故信等五三無漏料揀欲界繫四全男女憂苦十五少分除三無漏色界繫十五少分無色界繫八少分信等五意命捨三界全不繫欲界繫欲界為境有四男女憂苦欲色二界繫欲界為境有八信等五三無漏一向不繫侵二根三根證理立善性唯八三無漏信等五無記有八眼等五男女命通善染有六五受意根十因十五依義如是四緣依十五處義差別建立十因通於三性清淨十因正得離繫果兼得餘四果雜染十因正得異熟果兼得餘三果無記十因正得等流果餘三果兼得攝一切法盡十五依處皆作持業若十因者一唯依主同事二依士隨説引發定異六作持業觀待牽引生起攝受相違不相違一語依處立隨説因依處即因因為能依名句為所依所隨説二領受依處立觀待因有四一能受為因能受為果如依樂立苦二所受為因所受為果如待足有往來用三能受為因所受為果如待欲方求噉等獨影也四所受為因所受為果如見食方求噉等帶質也三習氣依處立牽引因三性名言種子未閏時遠牽當果四有閏種子依處立生起因即前種子備間已去五依無閏滅依處立攝受因為心心所三界三性勝劣相引六依境界依處除種子餘飲食等資助親緣者七根依處與境界為增上前五取色境第六取意生於八識八作用依處謂作者作具辨樓臺等九士用依處具人法十真實見依處無漏知見與一切法為因具上六處立攝受因前五辨有漏種具立辨無漏種十一隨順依處立引發因唯同類勝品三界相引以性論之則狹十二差別功能依處立定異因於一界中三性互引體性相稱名定不共他法名異界狹性寬亦引無為十三和合依處立同事因除言説因餘六為體十四一切法礙障依處立相違因十五不障礙依處立不相違因福非福義夫三界依正由業因而得謂福非福及不動有漏善不善業能招將來總別報福業人天別得總名亦有別報非福鬼畜亦有別報福業其不動業不似欲業許得餘趣受定所伏故由諸業習氣二取習氣俱俱謂業種子上有名言二取種是親疏緣互相助成業招生顯故先説之總別相望有三句一多生別報業一生總報受二一業總報能受招聚多別報果三多業招多總報然思業總報有盡名言習氣受果無窮為業流性同易感異熟性別難招因通善惡果唯無記問第六識現行善惡才生即滅自無其體如何感果答而熏本識起自功能名為習氣揀曾現受業取順現順生順不定業八解二取義諸名言習氣有為之法各別親種有二種一表義名言能詮音聲差別無記性能表於思思通三性於曲屈聲上建立名句能聞第六識上變似三性五蘊而熏成種問心緣五境何故名因境熏習答境劣心勝但是顯境名言若於詮起執即是表義勝用又名詮法勝不説依境二顯境名言即前七識能了境心心所見分當情相分所了之境必似木質多言色蘊從喻為名餘四蘊當體名言此通三界漏無漏前七識心王心所自證分為能熏熏下見分心種相分色種影及本質種本質有八隨彼所熏成種即能生彼八以成四對一名色取不收六無為及滅盡定有九十三法二相見取又除色十一有八十二法三心及心所取又除二十四不相應有八識五十一心所四本末取唯第八本前七末二我執習氣有二一俱生二分別隨二我執所熏成種令有情自他相貌差別若我執相分種即五蘊親因緣辨本質種見分種作自他相貌差別增上緣三有支習氣有二一善二不善能令異熟惡趣善趣別應知我執有支二種習氣於當來差別果是增上緣二種名言於當來報果為親因緣名色支義貫起十二支提網一百法知五蘊之多少明緣性之寬狹有三解一支性俱雜十二支收九十三法收分別癡一分行支中收三十六法善十一根隨二十五法識支中收第八識全名色支中收二十法遍行中作意思想并別境五前七識睡眠皆名色中收五塵六處支中收五色根及過去意觸支中收觸法全受支中收五受全受支中收俱生愛有支及老死支中收二十四不相應九十三法攝為五蘊者色蘊為色四蘊為名唯除六無為及滅盡定支雜六處觸受性雜善惡行支二支雜性不雜有二十八法色行識三蘊少分是任運報生無記非善染色少分中收五根五塵雜六處支行少分者別境五觸受作意睡眠思識少分者前七識想蘊全三支性俱不雜收二十一法五蘊中全收想三少分如前但除五根或加五根除六識二行支者體即是思身語意思家眷屬心心所思家相應能作業道尅性體唯善不善通現及種通招總別報所招名言根塵是別報兼行支收由此聖者四果及七地已前分段兼行支收聖不造後有業已斷一切支一分有支無全斷三無明支寬通三界具不善有覆二性前念任運無明俱思為因能起後念分別無明具十一殊勝七種無知最極猛利於一念頓發身語意招一期長短善惡趣果然全界煩惱皆能發業是兼無明支四識支唯阿賴耶親因緣種於母胎中因識為緣續生果識輪轉不絶任持自性非餘七識説第六為識支者順小乘五六處支唯內六處異熟俱生五色根及等無間過去意處三世分別過去是意六處收現在意第六收不爾名中無意識六觸支六處一分為體性唯無記此五因中一時招聚約當生分位説有前後次第生起也皆與無明行家所引五支種子令不失壞遇受取有閏時共為能有當來生老死故生老死是假五蘊種子是實有生住異滅四相假也七受支受者領納有二一緣內異熟受與前四一聚俱是種子二緣外境界受是現前領受當生處境界方起已後愛取八愛支即是貪法然全界煩惱能皆閏生正閏修道斷有九品助閏見道斷此通種現不還用種閏生現報有覆無記九取支愛增為取有四種一在家人多起欲貪取出家人有三一戒禁取二我語取三見取因此而興諍論十有支具前識等五種行支一分備閏已去能有當來生老死既依色心假立並是不相應行收生表有法先非有異表有法非凝然滅表有法後是無恐濫無為故不説住若説者暫有用料揀十二有支能引無明行所引識等五能生愛取有所生生老死過去十支因現在二支果現在造下十支因未來又有二支果若小乘三世説者過去二支因現在五支果現在三支因未來三支果十二有支皆作四句分別一有是無明非是行任運無明不發行支二有是行發非無明無漏行依正智三非是無明非是行正智真如四亦是無明亦是行分別無明發正行支十二有支既是緣生前後相望除因緣具餘三緣多少不定若有望有唯一增如生望老死支無望無有三如無明望行若有望無有二增上所若無望有唯增上如色望識或順或逆鄰次隔越相望具緣應思問老何不立支答老非定有附死立支問名色不遍何故立支答濕卵二生除在母胎餘如胎生皆有名色化生五根未明無色界意根名也上二界有十二支一分問愛非遍有答於境無愛於身起愛不還用愛種閏上二界生問所生唯二何少所引五支何多答因位難了故立五支果位易見故唯二支以顯三苦問發業唯一閏生何二答無明力強唯一閏生要數故二閏何故下地無明發上地行支答如愛亦緣當生地受漏俱義所漏之法有六一清淨色勝義根二浮塵根三外五塵四善心五染心六無記能漏有三一隨眠未斷二境現前三不如理作意前六法正生者漏俱當生者漏引已生者漏間根隨二十六惑也自性遍行別境漏相應成漏雖殊斷門有二一相應斷根隨二十六惑也二所緣斷能相應煩惱斷已境亦不來纏心能漏有五一漏俱二漏間三漏引四漏相應五漏自性所漏有八一人天內外塵二惡趣內外塵三人天三性心四惡趣三性心二種生死義一不思議變易生死為無漏有分別業由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命名為變易從能資無漏名不思議身或名意成身第四果回心入變易入定只資二十小劫入地頓悟智增者入悲增者不入入定資一大劫有五一無漏智為假感因二五蘊種子為實感因三所知障為疏助緣四悲願為觀助緣五所資有漏故業為異熟因有變易生死果二分段生死分即命根分即是段諸有漏善不善業思是假感因五蘊種子是實感因三閏生愛是親助緣四煩惱為疏助緣有分段生死果料揀定性非滅問若所知障助無漏業能感變易生死二乘定性應不永入無餘涅槃舉凡例聖答如諸異生局煩惱故不求三乘出離道道諦感苦問如何道諦能感苦也答假苦非實答是五蘊種子為實感因乖茲苦果問定性入滅與佛無異如何引變易生死長劫受苦二利須彼答為自求菩提利樂他故所知無招問既由無漏智資何須所知障助三義須彼答既未證無相大悲一執菩提可永二執有情可度三發起猛利悲願紹興十九年己巳歲正月望日幹緣小師僧文質前住廬山羅漢院傅賢首祖教明悟大師道通回施此板入臨安府南山慧因教院常住流通
